<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%" class="expo-html">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="application-name" content="MyBreakPoint" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MyBreakPoint" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="MyBreakPoint — tennis, pickleball &amp; padel stats, team tools, live match viewing, and AI insights." />
    <link rel="canonical" href="https://mybreakpoint.app/" />
    <title>%WEB_TITLE%</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <meta name="theme-color" content="#020617" id="theme-meta" />
    <meta name="msapplication-TileColor" content="#020617" />

    <meta property="og:site_name" content="MyBreakPoint" />
    <meta property="og:title" content="MyBreakPoint" />
    <meta property="og:description" content="The ultimate tennis, pickleball &amp; padel companion for tracking stats, managing teams, and achieving your peak performance" />
    <meta property="og:image" content="https://mybreakpoint.app/icon.png" />
    <meta property="og:url" content="https://mybreakpoint.app/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyBreakPoint" />
    <meta name="twitter:description" content="The ultimate tennis, pickleball &amp; padel companion for tracking stats, managing teams, and achieving your peak performance" />
    <meta name="twitter:image" content="https://mybreakpoint.app/icon.png" />
    <meta name="twitter:url" content="https://mybreakpoint.app/" />

    <script>
      if (window.matchMedia('(display-mode: standalone)').matches) {
        var el = document.getElementById('theme-meta');
        if (el) el.content = '#22c55e';
      }
    </script>

    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebSite","name":"MyBreakPoint","alternateName":["BreakPoint","MyBreakPoint App","mybreakpoint.app"],"url":"https://mybreakpoint.app/"}
    </script>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"Organization","name":"Break Point Technologies LLC","alternateName":["MyBreakPoint","BreakPoint"],"url":"https://mybreakpoint.app/","logo":"https://mybreakpoint.app/icon.png"}
    </script>

    <!-- react-native-web root element styles + app background -->
    <style id="expo-reset">
      html, body {
        height: 100%;
        margin: 0;
        background-color: #020617;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background-color: #020617;
        min-height: 100vh;
      }
    </style>
  </head>

  <body style="background-color: #020617;">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" style="background-color: #020617;"></div>
  </body>
</html>
